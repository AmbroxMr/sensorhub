apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secret
  labels:
    app.kubernetes.io/name: sensorhub
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
data:
  MONGO_ROOT_PASSWORD: {{ .Values.mongodb.auth.rootPassword | b64enc | quote }}
  MONGO_USERNAME: {{ .Values.mongodb.auth.username | b64enc | quote }}
  MINIO_ACCESS_KEY: {{ .Values.minio.auth.rootUser | b64enc | quote }}
  MINIO_SECRET_KEY: {{ .Values.minio.auth.rootPassword | b64enc | quote }}
