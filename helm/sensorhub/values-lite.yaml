image:
  tag: latest
  pullPolicy: IfNotPresent

api:
  replicas: 1

worker:
  replicas: 1

mongodb:
  auth:
    rootPassword: "changeme"
  persistence:
    size: 500Mi
    storageClass: standard
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

minio:
  auth:
    rootUser: "minioadmin"
    rootPassword: "changeme"
  provisioning:
    enabled: true
    buckets:
      - name: bucket
  persistence:
    size: 500Mi
    storageClass: standard
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

rabbitmq:
  auth:
    username: guest
    password: guest
  persistence:
    enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi
