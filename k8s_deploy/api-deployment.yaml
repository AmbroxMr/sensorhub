apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: sensorhub
  labels:
    app: api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: sensorhub:latest
          imagePullPolicy: IfNotPresent
          command: ["uv", "run", "uvicorn", "sensorhub.api:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: sensorhub-config
            - secretRef:
                name: sensorhub-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
