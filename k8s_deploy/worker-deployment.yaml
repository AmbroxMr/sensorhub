apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: sensorhub
  labels:
    app: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: sensorhub:latest
          imagePullPolicy: IfNotPresent
          command: ["uv", "run", "python", "-m", "sensorhub.worker"]
          envFrom:
            - configMapRef:
                name: sensorhub-config
            - secretRef:
                name: sensorhub-secret
